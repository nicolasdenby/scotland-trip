<style>
  :root{
    --navy:#1f3864; --accent:#2e74b5; --ink:#20242b; --grey:#6b7280;
    --line:#e5e7eb; --bg:#f4f6f9; --card:#ffffff; --good:#15803d; --warn:#b45309;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:840px;margin:0 auto;padding:18px 16px 80px}

  header.hero{background:linear-gradient(135deg,#1f3864,#2e74b5);color:#fff;border-radius:16px;
    padding:22px 22px 20px;box-shadow:0 6px 20px rgba(31,56,100,.18)}
  .hero h1{margin:0;font-size:26px;font-weight:800;letter-spacing:.2px}
  .hero .sub{opacity:.92;font-size:15px;margin-top:4px}
  .hero .who{opacity:.8;font-size:13px;margin-top:6px}
  header.hero [contenteditable]{outline:none}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 6px;position:sticky;top:0;z-index:20;
    background:var(--bg);padding:8px 0}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;
    padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#255f97;color:#fff}
  .btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn.ghostwarn:hover{border-color:#b45309;color:#b45309}

  .hint{font-size:12.5px;color:var(--grey);margin:2px 2px 14px}

  .sec{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:12px 0;overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .sec-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;
    border-left:5px solid var(--accent)}
  .sec-head .ico{font-size:20px;width:26px;text-align:center;flex:none}
  .sec-head .titles{flex:1;min-width:0}
  .sec-head .t{font-weight:700;font-size:16px}
  .sec-head .m{font-size:12.5px;color:var(--grey)}
  .sec-head .chev{transition:transform .2s ease;color:var(--grey);flex:none;font-size:14px}
  .sec.open .chev{transform:rotate(90deg)}
  .editsec{border:none;background:transparent;cursor:pointer;font-size:15px;opacity:.5;padding:5px 8px;border-radius:8px;flex:none;line-height:1}
  .editsec:hover,.editsec:active{opacity:1;background:#eef2f7}
  body.editing .editsec{opacity:1}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;flex:none}
  .badge.booked{background:#e7f3ea;color:var(--good)}
  .badge.tobook{background:#fdf1e2;color:var(--warn)}
  .badge.plan{background:#e9f0f8;color:var(--accent)}

  .sec-body{display:none;padding:4px 16px 16px 16px}
  .sec.open .sec-body{display:block}

  .rows{margin:6px 0}
  .row{display:flex;gap:10px;padding:5px 0;border-bottom:1px dashed #eef0f3;font-size:14.5px}
  .row:last-child{border-bottom:0}
  .row .k{font-weight:600;min-width:96px;color:#374151;flex:none}
  .row .v{flex:1}
  .notes{margin:8px 0 2px;padding:0;list-style:none}
  .notes li{position:relative;padding:5px 0 5px 20px;font-size:14.5px}
  .notes li:before{content:"";position:absolute;left:3px;top:12px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .notes li.subnote{margin-left:24px}
  .notes li.subnote:before{background:transparent;border:1.5px solid var(--accent);width:5px;height:5px}
  .tasks{margin:8px 0 2px;padding:0;list-style:none}
  .task{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:14.5px}
  .task input{margin-top:3px;width:17px;height:17px;flex:none;accent-color:var(--accent);cursor:pointer}
  .task.done .task-text{text-decoration:line-through;color:var(--grey)}
  .links{margin:8px 0 0}
  .links a{color:var(--accent);font-size:13.5px;margin-right:14px;text-decoration:none;border-bottom:1px solid #cdddef}
  .links a:hover{border-color:var(--accent)}

  /* places: tap to call / directions */
  .place{padding:11px 0;border-bottom:1px solid #eef0f3}
  .place:last-child{border-bottom:0}
  .place .pn{font-weight:700;font-size:15px}
  .place .ps{font-size:12.5px;color:var(--grey);margin:1px 0 7px}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .actbtn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:13.5px;font-weight:700;
    padding:9px 15px;border-radius:11px;border:1px solid transparent;line-height:1}
  .actbtn.call{background:#e7f3ea;color:#15803d}
  .actbtn.call:hover{background:#d5e9da}
  .actbtn.dir{background:#e9f0f8;color:#255f97}
  .actbtn.dir:hover{background:#d9e6f4}
  .actbtn.web{background:#f1f3f6;color:#475569}
  .actbtn.web:hover{background:#e6e9ee}
  .place .pedit{display:none}
  body.editing .place .pedit{display:block}
  body.editing .place .pview{display:none}
  .place .pedit .row .k{min-width:82px}
  /* inline sub-actions under a day bullet */
  .subacts{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 2px}
  .actbtn.sm{padding:6px 11px;font-size:12.5px;border-radius:9px}
  body.editing .subacts{display:none}

  /* edit affordances */
  [contenteditable]{outline:none}
  body.editing [data-edit]{background:#fbfdff;border:1px dashed #cfe0f2;border-radius:6px;padding:2px 6px;min-width:20px}
  body.editing [data-edit]:focus{border-color:var(--accent);background:#fff}
  .del,.add,.mv{border:none;background:#f1f3f6;color:#64748b;border-radius:7px;cursor:pointer;font-size:12px;
    padding:3px 8px;font-weight:600}
  .del:hover{background:#fde2e2;color:#b91c1c}
  .add:hover,.mv:hover{background:#e4edf7;color:var(--accent)}
  .rowtools,.sectools{display:none;gap:6px;flex-wrap:wrap}
  body.editing .rowtools{display:inline-flex}
  body.editing .sectools{display:flex;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);align-items:center}
  .sectools .grow{flex:1}
  .catpick{font-size:12.5px;border:1px solid var(--line);border-radius:7px;padding:4px 6px;color:#374151}
  .donebtn{background:var(--good);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-weight:700;font-size:13.5px;cursor:pointer}
  .donebtn:hover{background:#12692b}
  body:not(.editing) .donebtn{display:none}
  .del-x{margin-left:6px}
  body:not(.editing) .del,body:not(.editing) .add,body:not(.editing) .mv,
  body:not(.editing) .catpick,body:not(.editing) .del-x{display:none}

  footer{color:var(--grey);font-size:12px;text-align:center;margin-top:26px}

  @media print{
    .toolbar,.hint,.sectools,.del,.add,.mv{display:none!important}
    .sec-body{display:block!important}
    body{background:#fff}
    .sec{break-inside:avoid;box-shadow:none}
    header.hero{box-shadow:none;color:#1f3864;background:#fff;border:1px solid var(--line)}
  }
</style>
</head>

<script>
(function(){
  "use strict";

  // ============ SHARED SYNC (Supabase) ============
  // Paste your two values between the quotes, then re-upload this file.
  // Leave them blank and the planner still works (saves on this device only).
  var SUPABASE_URL = "https://wmnofxxqnogdiehkatok.supabase.co";   // e.g. https://abcdefgh.supabase.co
  var SUPABASE_KEY = "sb_publishable_5qUIAhlf2zsdfg_iLBPJ5g_7NA5XXMP";   // your anon public key (long string)
  // ================================================
  var CLOUD = !!(SUPABASE_URL && SUPABASE_KEY);

  var ICONS = {travel:"🚆", flight:"✈️", car:"🚗", stay:"🛏️", food:"🍽️", day:"📅", info:"📋"};
  var CATS = [["travel","Train"],["flight","Flight"],["car","Car hire"],["stay","Stay"],["food","Food / reservations"],["day","Day"],["info","Other"]];

  var STATE = load();
  var KEY = "tripplanner:" + (STATE.id || "trip");
  var app = document.getElementById("app");
  var editing = false;

  function load(){
    var embedded = JSON.parse(document.getElementById("trip-data").textContent);
    var k = "tripplanner:" + (embedded.id || "trip");
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem(k)); } catch(e){}
    var st = (saved && (saved.updated||0) >= (embedded.updated||0)) ? saved : embedded;
    if (st && st.sections) st.sections.forEach(function(s){ s.open = false; });
    return st;
  }
  function save(){
    STATE.updated = Date.now();
    try { localStorage.setItem(KEY, JSON.stringify(STATE)); } catch(e){}
    cloudPush();
  }

  // ---- shared cloud sync (Supabase REST) ----
  function rowId(){ return STATE.id || "trip"; }
  function supaHeaders(){
    return { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY,
             "Content-Type": "application/json" };
  }
  var pushTimer = null;
  function cloudPush(){
    if (!CLOUD) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(doPush, 700);
  }
  function doPush(){
    if (!CLOUD) return;
    var h = supaHeaders();
    h["Prefer"] = "resolution=merge-duplicates,return=minimal";
    fetch(SUPABASE_URL + "/rest/v1/trips", {
      method: "POST", headers: h,
      body: JSON.stringify({ id: rowId(), data: STATE })
    }).catch(function(){});
  }
  function syncFromCloud(){
    if (!CLOUD) return;
    fetch(SUPABASE_URL + "/rest/v1/trips?select=data&id=eq." + encodeURIComponent(rowId()), {
      headers: supaHeaders()
    }).then(function(r){ return r.ok ? r.json() : null; }).then(function(rows){
      if (!rows) return;
      if (!rows.length) { doPush(); return; }        // seed the shared copy
      var remote = rows[0].data;
      if (remote && (remote.updated||0) > (STATE.updated||0) && !editing) {
        var openT = {}; (STATE.sections||[]).forEach(function(s){ if (s.open) openT[s.title] = 1; });
        STATE = remote;
        (STATE.sections||[]).forEach(function(s){ s.open = !!openT[s.title]; });
        try { localStorage.setItem(KEY, JSON.stringify(STATE)); } catch(e){}
        render();
        document.querySelectorAll("[data-edit]").forEach(function(el){ el.contentEditable = false; });
      }
    }).catch(function(){});
  }
  function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function mapsUrl(q, walk){ return "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(q) + (walk ? "&travelmode=walking" : ""); }

  function headerFields(){
    ["title","subtitle","who"].forEach(function(f){
      var el = document.querySelector('[data-field="'+f+'"]');
      if (el) el.textContent = STATE[f] || "";
    });
  }

  function render(){
    headerFields();
    app.innerHTML = "";
    STATE.sections.forEach(function(sec, i){
      app.appendChild(renderSection(sec, i));
    });
  }

  function el(tag, cls, html){
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function renderSection(sec, i){
    var wrap = el("div", "sec" + (sec.open ? " open" : ""));
    wrap.dataset.sec = i;

    var head = el("div", "sec-head");
    head.dataset.action = "toggle";
    head.innerHTML =
      '<span class="ico">'+ (ICONS[sec.cat]||ICONS.info) +'</span>'+
      '<div class="titles">'+
        '<div class="t" data-edit data-sec="'+i+'" data-k="title">'+ esc(sec.title) +'</div>'+
        '<div class="m" data-edit data-sec="'+i+'" data-k="meta">'+ esc(sec.meta||"") +'</div>'+
      '</div>'+
      (sec.badge ? '<span class="badge '+sec.badge+'">'+ badgeText(sec.badge) +'</span>' : '')+
      '<button class="editsec" data-action="editsec" title="Edit this section" aria-label="Edit this section">✏️</button>'+
      '<span class="chev">▶</span>';
    wrap.appendChild(head);

    var body = el("div", "sec-body");

    // places: tap-to-call / directions
    if (sec.places && sec.places.length){
      var pw = el("div", "placewrap");
      sec.places.forEach(function(p, j){
        var tel = p.phone ? "tel:" + p.phone.replace(/[^+0-9]/g,"") : "";
        var dir = p.mapq ? "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(p.mapq) + (p.walk ? "&travelmode=walking" : "") : "";
        var pl = el("div", "place");
        pl.innerHTML =
          '<div class="pview">'+
            '<div class="pn">'+ esc(p.name) +'</div>'+
            (p.sub ? '<div class="ps">'+ esc(p.sub) +'</div>' : '')+
            '<div class="actions">'+
              (tel ? '<a class="actbtn call" href="'+ tel +'">📞 '+ esc(p.phone) +'</a>' : '')+
              (dir ? '<a class="actbtn dir" href="'+ dir +'" target="_blank" rel="noopener">📍 Directions</a>' : '')+
              (p.url ? '<a class="actbtn web" href="'+ esc(p.url) +'" target="_blank" rel="noopener">🔗 Web</a>' : '')+
            '</div>'+
          '</div>'+
          '<div class="pedit">'+
            '<div class="row"><span class="k">Name</span><span class="v" data-edit data-sec="'+i+'" data-place="'+j+'" data-k="name">'+ esc(p.name) +'</span></div>'+
            '<div class="row"><span class="k">Note</span><span class="v" data-edit data-sec="'+i+'" data-place="'+j+'" data-k="sub">'+ esc(p.sub||"") +'</span></div>'+
            '<div class="row"><span class="k">Phone</span><span class="v" data-edit data-sec="'+i+'" data-place="'+j+'" data-k="phone">'+ esc(p.phone||"") +'</span></div>'+
            '<div class="row"><span class="k">Directions</span><span class="v" data-edit data-sec="'+i+'" data-place="'+j+'" data-k="mapq">'+ esc(p.mapq||"") +'</span></div>'+
            '<div class="row"><span class="k">Website</span><span class="v" data-edit data-sec="'+i+'" data-place="'+j+'" data-k="url">'+ esc(p.url||"") +'</span> <button class="del" data-action="del-place" data-sec="'+i+'" data-j="'+j+'">remove ✕</button></div>'+
          '</div>';
        pw.appendChild(pl);
      });
      body.appendChild(pw);
    }

    // key/value fields
    if (sec.fields && sec.fields.length || editing){
      var rows = el("div", "rows");
      (sec.fields||[]).forEach(function(r, j){
        var row = el("div", "row");
        row.innerHTML =
          '<span class="k" data-edit data-sec="'+i+'" data-row="'+j+'" data-k="k">'+ esc(r.k) +'</span>'+
          '<span class="v" data-edit data-sec="'+i+'" data-row="'+j+'" data-k="v">'+ esc(r.v) +'</span>'+
          '<span class="rowtools"><button class="del" data-action="del-field" data-sec="'+i+'" data-j="'+j+'">✕</button></span>';
        rows.appendChild(row);
      });
      body.appendChild(rows);
    }

    // bullet notes
    if (sec.notes && sec.notes.length || editing){
      var ul = el("ul", "notes");
      (sec.notes||[]).forEach(function(n, j){
        var isObj = n && typeof n === "object";
        var text = isObj ? (n.text||"") : n;
        var liClass = isObj && n.sub ? "subnote" : "";
        var tel = isObj && n.phone ? "tel:" + n.phone.replace(/[^+0-9]/g,"") : "";
        var dir = isObj && n.mapq ? mapsUrl(n.mapq, n.walk) : "";
        var web = isObj && n.url ? n.url : "";
        var li = el("li", liClass);
        li.innerHTML =
          '<span data-edit data-sec="'+i+'" data-note="'+j+'">'+ esc(text) +'</span>'+
          '<span class="rowtools del-x"><button class="del" data-action="del-note" data-sec="'+i+'" data-j="'+j+'">✕</button></span>'+
          ((tel||dir||web) ?
            '<div class="subacts">'+
              (tel ? '<a class="actbtn call sm" href="'+ tel +'">📞 '+ esc(n.phone) +'</a>' : '')+
              (dir ? '<a class="actbtn dir sm" href="'+ dir +'" target="_blank" rel="noopener">📍 Directions</a>' : '')+
              (web ? '<a class="actbtn web sm" href="'+ esc(web) +'" target="_blank" rel="noopener">🔗 Web</a>' : '')+
            '</div>' : '');
        ul.appendChild(li);
      });
      body.appendChild(ul);
    }

    // checklist tasks
    if (sec.tasks && sec.tasks.length || (editing && sec.cat==="food")){
      var tl = el("ul", "tasks");
      (sec.tasks||[]).forEach(function(t, j){
        var li = el("li", "task" + (t.done ? " done" : ""));
        li.innerHTML =
          '<input type="checkbox" data-action="toggle-task" data-sec="'+i+'" data-j="'+j+'" '+(t.done?"checked":"")+'>'+
          '<span class="task-text" data-edit data-sec="'+i+'" data-task="'+j+'" data-k="text">'+ esc(t.text) +'</span>'+
          (t.u && !editing ? ' <a href="'+esc(t.u)+'" target="_blank" rel="noopener" style="font-size:12.5px;margin-left:4px">↗</a>' : '')+
          '<span class="rowtools del-x"><button class="del" data-action="del-task" data-sec="'+i+'" data-j="'+j+'">✕</button></span>';
        tl.appendChild(li);
      });
      body.appendChild(tl);
    }

    // links
    if (sec.links && sec.links.length){
      var lk = el("div", "links");
      sec.links.forEach(function(l, j){
        if (editing){
          lk.appendChild(el("div","row",
            '<span class="k">Link text</span><span class="v" data-edit data-sec="'+i+'" data-link="'+j+'" data-k="t">'+esc(l.t)+'</span>'+
            '<span class="rowtools"><button class="del" data-action="del-link" data-sec="'+i+'" data-j="'+j+'">✕</button></span>'));
          lk.appendChild(el("div","row",
            '<span class="k">URL</span><span class="v" data-edit data-sec="'+i+'" data-link="'+j+'" data-k="u">'+esc(l.u)+'</span>'));
        } else {
          var a = el("a"); a.href = l.u; a.target = "_blank"; a.rel = "noopener"; a.textContent = l.t || l.u;
          lk.appendChild(a);
        }
      });
      body.appendChild(lk);
    }

    // per-section edit tools
    var tools = el("div", "sectools");
    tools.innerHTML =
      '<button class="donebtn" data-action="done-edit">✓ Done</button>'+
      '<button class="add" data-action="add-note" data-sec="'+i+'">+ note</button>'+
      '<button class="add" data-action="add-field" data-sec="'+i+'">+ detail</button>'+
      '<button class="add" data-action="add-task" data-sec="'+i+'">+ checklist item</button>'+
      '<button class="add" data-action="add-place" data-sec="'+i+'">+ place (call/directions)</button>'+
      '<button class="add" data-action="add-link" data-sec="'+i+'">+ link</button>'+
      '<select class="catpick" data-action="set-cat" data-sec="'+i+'">'+
        CATS.map(function(c){return '<option value="'+c[0]+'"'+(sec.cat===c[0]?" selected":"")+'>'+c[1]+'</option>';}).join("")+
      '</select>'+
      '<span class="grow"></span>'+
      '<button class="mv" data-action="up" data-sec="'+i+'">↑</button>'+
      '<button class="mv" data-action="down" data-sec="'+i+'">↓</button>'+
      '<button class="del" data-action="del-section" data-sec="'+i+'">Delete section ✕</button>';
    body.appendChild(tools);

    wrap.appendChild(body);
    return wrap;
  }

  function badgeText(b){ return b==="booked"?"Booked":b==="tobook"?"To book":b==="plan"?"Plan":b; }

  // ---- editing: write text edits back to state ----
  document.addEventListener("input", function(e){
    var t = e.target;
    // header
    if (t.dataset && t.dataset.field){ STATE[t.dataset.field] = t.textContent; save(); return; }
    if (!t.dataset || t.dataset.sec == null) return;
    var i = +t.dataset.sec, sec = STATE.sections[i];
    if (!sec) return;
    if (t.dataset.k === "title" && t.classList.contains("t")){ sec.title = t.textContent; }
    else if (t.dataset.k === "meta"){ sec.meta = t.textContent; }
    else if (t.dataset.row != null){ sec.fields[+t.dataset.row][t.dataset.k] = t.textContent; }
    else if (t.dataset.note != null){ var ni=+t.dataset.note; if (sec.notes[ni] && typeof sec.notes[ni]==="object"){ sec.notes[ni].text = t.textContent; } else { sec.notes[ni] = t.textContent; } }
    else if (t.dataset.task != null){ sec.tasks[+t.dataset.task].text = t.textContent; }
    else if (t.dataset.place != null){ sec.places[+t.dataset.place][t.dataset.k] = t.textContent; }
    else if (t.dataset.link != null){ sec.links[+t.dataset.link][t.dataset.k] = t.textContent; }
    save();
  });

  // ---- clicks ----
  document.addEventListener("click", function(e){
    var a = e.target.closest("[data-action]");
    if (!a) return;
    var act = a.dataset.action;

    if (act === "toggle"){
      if (editing && e.target.closest("[data-edit]")) return; // let them type in the title while editing
      var sec = a.closest(".sec"); var i = +sec.dataset.sec;
      STATE.sections[i].open = !STATE.sections[i].open;
      sec.classList.toggle("open"); save(); return;
    }
    if (act === "done-edit"){
      editing = false;
      document.body.classList.remove("editing");
      var gbd = document.getElementById("btn-edit"); gbd.classList.remove("on"); gbd.innerHTML = "✏️ Edit";
      render();
      document.querySelectorAll("[data-edit]").forEach(function(el){ el.contentEditable = false; });
      return;
    }
    if (act === "editsec"){
      var esec = a.closest(".sec"); var ei = +esec.dataset.sec;
      if (!editing){
        editing = true;
        document.body.classList.add("editing");
        var gb = document.getElementById("btn-edit"); gb.classList.add("on"); gb.innerHTML = "✓ Done";
      }
      STATE.sections[ei].open = true;
      render();
      document.querySelectorAll("[data-edit]").forEach(function(el){ el.contentEditable = true; });
      var target = document.querySelector('.sec[data-sec="'+ei+'"]');
      if (target) target.scrollIntoView({behavior:"smooth", block:"start"});
      return;
    }
    if (act === "toggle-task"){
      var i = +a.dataset.sec, j = +a.dataset.j;
      STATE.sections[i].tasks[j].done = a.checked;
      a.closest(".task").classList.toggle("done", a.checked); save(); return;
    }

    // structural (need re-render)
    var i = a.dataset.sec != null ? +a.dataset.sec : null;
    var s = i != null ? STATE.sections[i] : null;
    switch(act){
      case "add-field": s.fields = s.fields||[]; s.fields.push({k:"Detail", v:""}); s.open=true; break;
      case "del-field": s.fields.splice(+a.dataset.j,1); break;
      case "add-note": s.notes = s.notes||[]; s.notes.push("New note"); s.open=true; break;
      case "del-note": s.notes.splice(+a.dataset.j,1); break;
      case "add-task": s.tasks = s.tasks||[]; s.tasks.push({text:"New item", done:false, u:""}); s.open=true; break;
      case "del-task": s.tasks.splice(+a.dataset.j,1); break;
      case "add-link": s.links = s.links||[]; s.links.push({t:"Link", u:"https://"}); s.open=true; break;
      case "del-link": s.links.splice(+a.dataset.j,1); break;
      case "add-place": s.places = s.places||[]; s.places.push({name:"New place", sub:"", phone:"", mapq:"", url:""}); s.open=true; break;
      case "del-place": s.places.splice(+a.dataset.j,1); break;
      case "set-cat": return; // handled on change
      case "up": if(i>0){ STATE.sections.splice(i-1,0,STATE.sections.splice(i,1)[0]); } break;
      case "down": if(i<STATE.sections.length-1){ STATE.sections.splice(i+1,0,STATE.sections.splice(i,1)[0]); } break;
      case "del-section": if(confirm("Delete this section?")){ STATE.sections.splice(i,1); } else return; break;
      case "add-day": STATE.sections.push({cat:"day", title:"New day", meta:"", badge:"plan", open:true, fields:[], notes:["Plan..."], tasks:[], links:[]}); break;
      case "add-section": STATE.sections.push({cat:"info", title:"New section", meta:"", badge:"", open:true, fields:[{k:"Detail",v:""}], notes:[], tasks:[], links:[]}); break;
      case "download": return downloadCopy();
      case "print": window.print(); return;
      case "reset": return resetTrip();
      default: return;
    }
    save(); render();
  });

  document.addEventListener("change", function(e){
    var a = e.target.closest('[data-action="set-cat"]');
    if (!a) return;
    STATE.sections[+a.dataset.sec].cat = a.value; save(); render();
  });

  // edit toggle
  document.getElementById("btn-edit").addEventListener("click", function(){
    editing = !editing;
    document.body.classList.toggle("editing", editing);
    this.classList.toggle("on", editing);
    this.innerHTML = editing ? "✓ Done" : "✏️ Edit";
    document.querySelectorAll("[data-edit]").forEach(function(el){ el.contentEditable = editing; });
    render();
    document.querySelectorAll("[data-edit]").forEach(function(el){ el.contentEditable = editing; });
  });

  function downloadCopy(){
    save();
    var snapshot = app.innerHTML;
    app.innerHTML = "";                       // keep file small
    document.getElementById("trip-data").textContent = JSON.stringify(STATE, null, 2);
    var html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    app.innerHTML = snapshot;                  // restore view
    var blob = new Blob([html], {type:"text/html"});
    var url = URL.createObjectURL(blob);
    var link = document.createElement("a");
    var name = (STATE.title||"trip").replace(/[^a-z0-9]+/gi,"_").replace(/^_|_$/g,"");
    link.href = url; link.download = name + ".html";
    document.body.appendChild(link); link.click(); link.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
  }

  function resetTrip(){
    if (!confirm("Start a fresh blank trip? Your current trip stays in the file you last downloaded.")) return;
    STATE = {
      id: "trip-" + Date.now(),
      updated: Date.now(),
      title: "New Trip",
      subtitle: "Add dates",
      who: "Add travellers",
      sections: [
        {cat:"travel", title:"Travel", meta:"Train / flight", badge:"", open:true, fields:[{k:"Outbound",v:""},{k:"Return",v:""}], notes:[], tasks:[], links:[]},
        {cat:"car", title:"Car hire", meta:"", badge:"", open:false, fields:[{k:"Pick up",v:""},{k:"Drop off",v:""}], notes:[], tasks:[], links:[]},
        {cat:"stay", title:"Accommodation", meta:"", badge:"", open:false, fields:[{k:"Check in",v:""},{k:"Check out",v:""},{k:"Address",v:""}], notes:[], tasks:[], links:[]},
        {cat:"food", title:"Reservations to book", meta:"Tick as you go", badge:"tobook", open:true, fields:[], notes:[], tasks:[{text:"First reservation", done:false, u:""}], links:[]},
        {cat:"day", title:"Day 1", meta:"", badge:"plan", open:false, fields:[], notes:["Plan..."], tasks:[], links:[]}
      ]
    };
    KEY = "tripplanner:" + STATE.id;
    save(); render();
    window.scrollTo(0,0);
  }

  render();

  if (CLOUD) {
    syncFromCloud();
    setInterval(syncFromCloud, 6000);
    window.addEventListener("focus", syncFromCloud);
    document.addEventListener("visibilitychange", function(){ if (!document.hidden) syncFromCloud(); });
  }
})();
</script>
</body>
</html>
